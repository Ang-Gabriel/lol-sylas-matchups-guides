<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sylas — Guia de Matchups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6130;
    --chain: #8ab4d4;
    --chain-glow: #4a8abf;
    --bg-deep: #050810;
    --bg-mid: #0a0e1a;
    --bg-card: #0d1220;
    --bg-card-hover: #121829;
    --text-main: #e8e0d0;
    --text-muted: #7a7265;
    --text-dim: #4a4538;
    --red-accent: #8b2020;
    --red-bright: #c0392b;
    --purple-mid: #6a3fa0;
    --purple-bright: #9b6ee0;
    --border-subtle: rgba(201,168,76,0.15);
    --border-strong: rgba(201,168,76,0.4);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background atmosphere ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(106,63,160,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(139,32,32,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 30% 50% at 10% 60%, rgba(74,138,191,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Header ── */
  header {
    padding: 60px 0 40px;
    text-align: center;
    position: relative;
  }

  .chain-line {
    position: absolute;
    top: 50%;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), var(--gold), var(--gold-dim), transparent);
    opacity: 0.4;
  }

  .crown {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(38px, 6vw, 68px);
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 8px;
    text-shadow: 0 0 60px rgba(201,168,76,0.3);
  }

  h1 span {
    color: var(--text-muted);
    font-size: 0.45em;
    display: block;
    font-weight: 400;
    letter-spacing: 8px;
    margin-top: 4px;
  }

  .tagline {
    font-style: italic;
    color: var(--text-muted);
    font-size: 13px;
    letter-spacing: 1px;
    margin-top: 16px;
  }

  /* ── Search ── */
  .search-section {
    padding: 32px 0 48px;
  }

  .search-wrapper {
    position: relative;
    max-width: 560px;
    margin: 0 auto;
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    opacity: 0.5;
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text-main);
    font-family: 'Raleway', sans-serif;
    font-size: 15px;
    font-weight: 400;
    padding: 16px 20px 16px 48px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }

  #search-input::placeholder { color: var(--text-dim); }

  #search-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.08), inset 0 0 20px rgba(201,168,76,0.03);
  }

  .search-tags-wrapper {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 14px;
  }

  .search-tags-group {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }

  .tags-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 36px;
    text-align: right;
  }

  .tags-divider {
    height: 1px;
    background: var(--border-subtle);
    margin: 0 auto;
    width: 60%;
  }

  .search-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag.tag-mid { border-color: rgba(201,168,76,0.3); color: var(--gold-dim); }
  .tag.tag-mid:hover, .tag.tag-mid.active { border-color: var(--gold); color: var(--gold-light); background: rgba(201,168,76,0.08); }
  .tag.tag-top { border-color: rgba(155,110,224,0.3); color: #7a50c0; }
  .tag.tag-top:hover, .tag.tag-top.active { border-color: var(--purple-bright); color: var(--purple-bright); background: rgba(155,110,224,0.08); }

  .tag {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .tag:hover, .tag.active {
    border-color: var(--gold-dim);
    color: var(--gold-light);
    background: rgba(201,168,76,0.05);
  }

  /* ── Results count ── */
  .results-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 20px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 28px;
  }

  .results-count {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .results-count strong {
    color: var(--gold);
    font-weight: 500;
  }

  .sort-select {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 1px;
    cursor: pointer;
    outline: none;
  }

  .sort-select option { background: var(--bg-mid); }

  /* ── Matchup Grid ── */
  .matchup-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .matchup-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .matchup-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .matchup-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }

  .matchup-card:hover::before { opacity: 1; }

  .card-favorable::before { background: linear-gradient(90deg, var(--chain-glow), var(--purple-bright)); }
  .card-neutral::before { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .card-hard::before { background: linear-gradient(90deg, var(--red-accent), var(--red-bright)); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .champion-info { flex: 1; }

  .champion-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 2px;
  }

  .champion-role {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .difficulty-badge {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 1px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-favorable { background: rgba(74,138,191,0.15); color: var(--chain); border: 1px solid rgba(74,138,191,0.3); }
  .badge-neutral { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
  .badge-hard { background: rgba(139,32,32,0.2); color: #e06060; border: 1px solid rgba(192,57,43,0.3); }

  .card-tip {
    font-size: 13px;
    line-height: 1.65;
    color: #9e9688;
    margin-bottom: 16px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .tip-tag {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid var(--border-subtle);
    color: var(--text-dim);
    border-radius: 1px;
  }

  .tip-tag.chain { border-color: rgba(74,138,191,0.3); color: #6a9fc0; }
  .tip-tag.burst { border-color: rgba(155,110,224,0.3); color: #9b6ee0; }
  .tip-tag.poke { border-color: rgba(201,168,76,0.2); color: #8a7040; }
  .tip-tag.sustain { border-color: rgba(80,160,80,0.3); color: #5aaa5a; }
  .tip-tag.passive { border-color: rgba(120,100,80,0.3); color: #8a7a60; }

  .expand-btn {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    border-top: 1px solid var(--border-subtle);
    color: var(--text-dim);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 12px 0 0;
    margin-top: 16px;
    cursor: pointer;
    text-align: center;
    transition: color 0.2s;
  }

  .expand-btn:hover { color: var(--gold); }

  /* ── Modal / Detail Panel ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,8,16,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .overlay.open { display: flex; }

  .detail-panel {
    background: var(--bg-mid);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    width: 100%;
    max-width: 680px;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    animation: panelIn 0.25s ease;
  }

  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.97) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-track { background: transparent; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  .panel-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .panel-avatar {
    width: 56px;
    height: 56px;
    border-radius: 2px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  .panel-title-area { flex: 1; }

  .panel-champ-name {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold-light);
    margin-bottom: 4px;
  }

  .panel-meta {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .close-btn {
    background: transparent;
    border: 1px solid var(--border-subtle);
    color: var(--text-muted);
    font-family: 'Raleway', sans-serif;
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .close-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  .panel-body { padding: 24px 28px; }

  .section-heading {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-subtle);
  }

  .tip-block {
    margin-bottom: 28px;
  }

  .tip-item {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    align-items: flex-start;
  }

  .tip-bullet {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold-dim);
    flex-shrink: 0;
    margin-top: 7px;
  }

  .tip-item p {
    font-size: 14px;
    line-height: 1.7;
    color: #9e9688;
  }

  .tip-item p strong {
    color: var(--gold-light);
    font-weight: 500;
  }

  .ability-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .ability-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 2px;
    padding: 12px 14px;
  }

  .ability-key {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gold-dim);
    margin-bottom: 4px;
  }

  .ability-effect {
    font-size: 12px;
    line-height: 1.55;
    color: #7a7265;
  }

  .power-spike-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .spike-pill {
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 5px 12px;
    border-radius: 1px;
    border: 1px solid;
  }

  .spike-early { border-color: rgba(80,160,80,0.3); color: #5aaa5a; background: rgba(80,160,80,0.05); }
  .spike-mid { border-color: rgba(201,168,76,0.3); color: var(--gold); background: rgba(201,168,76,0.05); }
  .spike-late { border-color: rgba(155,110,224,0.3); color: var(--purple-bright); background: rgba(155,110,224,0.05); }
  .spike-weak { border-color: rgba(139,32,32,0.3); color: #e06060; background: rgba(139,32,32,0.05); }

  .no-results {
    text-align: center;
    padding: 80px 0;
    display: none;
  }

  .no-results-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .no-results p {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  /* ── Sticky Nav ── */
  .sticky-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(5,8,16,0.9);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-subtle);
    padding: 12px 0;
  }

  .sticky-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .sticky-brand {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--gold-dim);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .sticky-search {
    flex: 1;
    max-width: 380px;
  }

  .sticky-search input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-main);
    font-family: 'Raleway', sans-serif;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }

  .sticky-search input:focus { border-color: var(--gold-dim); }
  .sticky-search input::placeholder { color: var(--text-dim); }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 60px 0 40px;
    border-top: 1px solid var(--border-subtle);
    margin-top: 60px;
  }

  footer p {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Scroll to top */
  .scroll-top {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 42px; height: 42px;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 90;
  }

  .scroll-top.visible { display: flex; }
  .scroll-top:hover { background: var(--bg-card-hover); }

  @media (max-width: 600px) {
    .ability-grid { grid-template-columns: 1fr; }
    .panel-header { flex-direction: column; }
    .matchup-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Sticky nav -->
<nav class="sticky-nav" id="sticky-nav" style="display:none;">
  <div class="sticky-inner">
    <span class="sticky-brand">SYLAS</span>
    <div class="sticky-search">
      <input type="text" id="sticky-search-input" placeholder="Buscar campeão...">
    </div>
  </div>
</nav>

<!-- Hero Header -->
<header>
  <div class="container">
    <p class="crown">— O Abjulgado —</p>
    <h1>SYLAS<span>guia de matchups</span></h1>
    <p class="tagline">"Eles forjaram as correntes. Eu as uso como armas."</p>
  </div>
</header>

<!-- Search Section -->
<section class="search-section">
  <div class="container">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
      </svg>
      <input type="text" id="search-input" placeholder="Pesquisar campeão (ex: Lux, Zed, Viktor...)">
    </div>
    <div class="search-tags-wrapper">
      <div class="search-tags-group">
        <span class="tags-label">Lane</span>
        <div class="search-tags">
          <button class="tag active" data-filter="all">Todas</button>
          <button class="tag tag-mid" data-filter="mid">◆ Mid Lane</button>
          <button class="tag tag-top" data-filter="top">▲ Top Lane</button>
        </div>
      </div>
      <div class="tags-divider"></div>
      <div class="search-tags-group">
        <span class="tags-label">Filtro</span>
        <div class="search-tags">
          <button class="tag" data-filter="favorable">Favoráveis</button>
          <button class="tag" data-filter="neutral">Neutros</button>
          <button class="tag" data-filter="hard">Difíceis</button>
        </div>
      </div>
      <div class="tags-divider"></div>
      <div class="search-tags-group">
        <span class="tags-label">Classe</span>
        <div class="search-tags">
          <button class="tag" data-filter="assassin">Assassinos</button>
          <button class="tag" data-filter="mage">Magos</button>
          <button class="tag" data-filter="tank">Tanques</button>
          <button class="tag" data-filter="fighter">Lutadores</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Main Content -->
<main>
  <div class="container">
    <div class="results-bar">
      <p class="results-count"><strong id="results-num">0</strong> matchups encontrados</p>
      <select class="sort-select" id="sort-select">
        <option value="name">Nome A–Z</option>
        <option value="favorable">Favoráveis primeiro</option>
        <option value="hard">Difíceis primeiro</option>
      </select>
    </div>

    <div class="matchup-grid" id="matchup-grid"></div>

    <div class="no-results" id="no-results">
      <div class="no-results-icon">⛓</div>
      <p>Nenhum campeão encontrado</p>
    </div>
  </div>
</main>

<!-- Detail Overlay -->
<div class="overlay" id="overlay">
  <div class="detail-panel" id="detail-panel">
    <div class="panel-header" id="panel-header"></div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<button class="scroll-top" id="scroll-top" title="Voltar ao topo">↑</button>

<footer>
  <div class="container">
    <p>Sylas Matchup Guide &nbsp;·&nbsp; League of Legends &nbsp;·&nbsp; Não afiliado à Riot Games &nbsp;·&nbsp; Feito por: Ang.Gabriel</p>
  </div>
</footer>

<script>
const MATCHUPS = [
  {
    id: 1,
    name: "Lux",
    role: "Mago",
    types: ["mage", "favorable"],

let filtered = [...MATCHUPS];
let activeLane = 'all';
let activeDiff = 'all';
let activeClass = 'all';
let searchQuery = '';
let sortBy = 'name';

const laneFilters = ['all', 'mid', 'top'];
const diffFilters = ['favorable', 'neutral', 'hard'];
const classFilters = ['assassin', 'mage', 'tank', 'fighter'];

function getDiffClass(d) {
  return d === 'favorable' ? 'card-favorable' : d === 'hard' ? 'card-hard' : 'card-neutral';
}
function getBadgeClass(d) {
  return d === 'favorable' ? 'badge-favorable' : d === 'hard' ? 'badge-hard' : 'badge-neutral';
}
function getBadgeLabel(d) {
  return d === 'favorable' ? 'Favorável' : d === 'hard' ? 'Difícil' : 'Neutro';
}

function applyFilters() {
  filtered = MATCHUPS.filter(m => {
    const matchSearch = m.name.toLowerCase().includes(searchQuery) ||
      m.role.toLowerCase().includes(searchQuery) ||
      m.lane.toLowerCase().includes(searchQuery) ||
      m.tip.toLowerCase().includes(searchQuery);
    const matchLane = activeLane === 'all' || m.lane === activeLane;
    const matchDiff = activeDiff === 'all' || m.difficulty === activeDiff;
    const matchClass = activeClass === 'all' || m.types.includes(activeClass);
    return matchSearch && matchLane && matchDiff && matchClass;
  });

  if (sortBy === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
  else if (sortBy === 'favorable') filtered.sort((a,b) => {
    const order = { favorable:0, neutral:1, hard:2 };
    return order[a.difficulty] - order[b.difficulty];
  });
  else if (sortBy === 'hard') filtered.sort((a,b) => {
    const order = { hard:0, neutral:1, favorable:2 };
    return order[a.difficulty] - order[b.difficulty];
  });

  render();
}

function render() {
  const grid = document.getElementById('matchup-grid');
  const noRes = document.getElementById('no-results');
  const count = document.getElementById('results-num');
  count.textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map((m, i) => `
    <div class="matchup-card ${getDiffClass(m.difficulty)}" style="animation-delay:${i*0.04}s" data-id="${m.id}">
      <div class="card-header">
        <div class="champion-info">
          <p class="champion-name">${m.name}</p>
          <p class="champion-role">${m.role}</p>
        </div>
        <span class="difficulty-badge ${getBadgeClass(m.difficulty)}">${getBadgeLabel(m.difficulty)}</span>
      </div>
      <p class="card-tip">${m.tip}</p>
      <div class="card-tags">
        <span class="tip-tag chain">⛓ Correntes</span>
        <span class="tip-tag burst">✦ ${m.runes.split(' ')[0]}</span>
        <span class="tip-tag passive">${m.role}</span>
        <span class="tip-tag" style="${m.lane === 'top' ? 'border-color:rgba(155,110,224,0.35);color:#9b6ee0' : 'border-color:rgba(201,168,76,0.25);color:#8a7040'}">${m.lane === 'top' ? '▲ Top Lane' : '◆ Mid Lane'}</span>
      </div>
      <button class="expand-btn">Ver dicas detalhadas ↓</button>
    </div>
  `).join('');

  grid.querySelectorAll('.matchup-card').forEach(card => {
    card.addEventListener('click', () => openDetail(parseInt(card.dataset.id)));
  });
}

function openDetail(id) {
  const m = MATCHUPS.find(x => x.id === id);
  if (!m) return;

  document.getElementById('panel-header').innerHTML = `
    <div class="panel-avatar">${m.name[0]}</div>
    <div class="panel-title-area">
      <p class="panel-champ-name">${m.name}</p>
      <div class="panel-meta">
        <span class="difficulty-badge ${getBadgeClass(m.difficulty)}">${getBadgeLabel(m.difficulty)}</span>
        <span style="font-size:11px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase">${m.role}</span>
        <span style="font-size:11px; letter-spacing:1px; text-transform:uppercase; color:${m.lane === 'top' ? '#9b6ee0' : '#8a7040'}">${m.lane === 'top' ? '▲ Top Lane' : '◆ Mid Lane'}</span>
      </div>
    </div>
    <button class="close-btn" id="close-btn">✕</button>
  `;

  document.getElementById('panel-body').innerHTML = `
    <div class="tip-block">
      <p class="section-heading">⛓ Dicas de Lane</p>
      ${m.tips.map(t => `
        <div class="tip-item">
          <div class="tip-bullet"></div>
          <p><strong>${t.bold}</strong>${t.text}</p>
        </div>
      `).join('')}
    </div>

    <div class="tip-block">
      <p class="section-heading">✦ Ultimate Roubada</p>
      <div style="background:rgba(201,168,76,0.05); border:1px solid var(--border-subtle); border-radius:2px; padding:16px 18px; margin-bottom:16px;">
        <p style="font-family:'Cinzel',serif; font-size:13px; color:var(--gold); margin-bottom:6px;">${m.ult}</p>
        <p style="font-size:13px; line-height:1.65; color:#9e9688;">${m.ultValue}</p>
      </div>
    </div>

    <div class="tip-block">
      <p class="section-heading">◈ Habilidades Relevantes</p>
      <div class="ability-grid">
        ${m.abilities.map(a => `
          <div class="ability-card">
            <p class="ability-key">${a.key}</p>
            <p class="ability-effect">${a.effect}</p>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="tip-block">
      <p class="section-heading">◇ Power Spikes</p>
      <div class="power-spike-row">
        ${m.spikes.map(s => `<span class="spike-pill spike-${s.type}">${s.label}</span>`).join('')}
      </div>
    </div>

    <div class="tip-block">
      <p class="section-heading">△ Fraquezas do Inimigo</p>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${m.weakness.map(w => `<span class="tip-tag">${w}</span>`).join('')}
      </div>
    </div>

    <div style="margin-top:24px; padding:14px 18px; background:rgba(201,168,76,0.04); border:1px solid var(--border-subtle); border-radius:2px;">
      <p style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px;">Runas Recomendadas</p>
      <p style="font-size:14px; color:var(--text-main);">${m.runes}</p>
    </div>
  `;

  const overlay = document.getElementById('overlay');
  overlay.classList.add('open');
  document.getElementById('close-btn').addEventListener('click', closeDetail);
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeDetail();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  document.getElementById('sticky-search-input').value = e.target.value;
  applyFilters();
});

document.getElementById('sticky-search-input').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase();
  document.getElementById('search-input').value = e.target.value;
  applyFilters();
});

document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', () => {
    const val = tag.dataset.filter;
    if (laneFilters.includes(val)) {
      document.querySelectorAll('.search-tags-group:nth-child(1) .tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      activeLane = val;
    } else if (diffFilters.includes(val)) {
      document.querySelectorAll('.search-tags-group:nth-child(3) .tag').forEach(t => t.classList.remove('active'));
      tag.classList.toggle('active');
      activeDiff = tag.classList.contains('active') ? val : 'all';
    } else if (classFilters.includes(val)) {
      document.querySelectorAll('.search-tags-group:nth-child(5) .tag').forEach(t => t.classList.remove('active'));
      tag.classList.toggle('active');
      activeClass = tag.classList.contains('active') ? val : 'all';
    }
    applyFilters();
  });
});

document.getElementById('sort-select').addEventListener('change', e => {
  sortBy = e.target.value;
  applyFilters();
});

const stickyNav = document.getElementById('sticky-nav');
const scrollTopBtn = document.getElementById('scroll-top');
const header = document.querySelector('header');

window.addEventListener('scroll', () => {
  const showSticky = window.scrollY > header.offsetHeight;
  stickyNav.style.display = showSticky ? 'block' : 'none';
  scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
});

scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

applyFilters();
</script>
</body>
</html>
